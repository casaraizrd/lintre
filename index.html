<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  width: 100%;
  min-height: 100%;
}

body {
  background: #edf4ec;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}

.container {
  width: min(100vw, 682px);
  max-width: 682px;
  position: relative;
  background: white;
  overflow: hidden;
  box-shadow: 0 18px 60px rgba(0,0,0,.16);
}

.bg {
  width: 100%;
  height: auto;
  display: block;
  user-select: none;
  pointer-events: none;
}

.hotspot {
  position: absolute;
  left: 15.8%;
  width: 68.8%;
  height: 7.2%;
  border-radius: 999px;
  z-index: 10;
  display: block;
  text-indent: -9999px;
  overflow: hidden;
  cursor: pointer;
}

.hotspot::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 999px;
  opacity: 0;
  background: rgba(255,255,255,.12);
  box-shadow:
    0 12px 30px rgba(0,0,0,.16),
    0 0 24px rgba(101,192,68,.35);
  transition: opacity .2s ease, transform .25s ease;
  pointer-events: none;
}

.hotspot::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 999px;
  opacity: 0;
  background: linear-gradient(
    120deg,
    rgba(255,255,255,0) 0%,
    rgba(255,255,255,.15) 35%,
    rgba(255,255,255,.45) 50%,
    rgba(255,255,255,.12) 65%,
    rgba(255,255,255,0) 100%
  );
  transform: translateX(-130%);
  pointer-events: none;
}

@media (hover:hover) and (pointer:fine) {
  .hotspot {
    overflow: visible;
  }

  .hotspot:hover::before {
    opacity: 1;
    transform: translateX(32px) scale(1.04);
  }

  .hotspot:hover::after {
    opacity: 1;
    animation: shine .7s ease forwards;
  }

  .hotspot:active::before {
    transform: translateX(20px) scale(.99);
  }
}

@media (hover:none), (pointer:coarse) {
  .container {
    width: 100vw;
    max-width: 682px;
    box-shadow: none;
  }

  .hotspot {
    overflow: hidden;
    touch-action: manipulation;
  }

  .hotspot:active::before {
    opacity: 1;
    transform: scale(.985);
  }

  .hotspot:active::after {
    opacity: 1;
    animation: shineMobile .45s ease forwards;
  }
}

@keyframes shine {
  from { transform: translateX(-130%); }
  to { transform: translateX(150%); }
}

@keyframes shineMobile {
  from { transform: translateX(-120%); }
  to { transform: translateX(130%); }
}

.wa-main { top: 27.2%; }
.ita { top: 35.8%; }
.catalogo { top: 44.3%; }
.web { top: 52.8%; }
.tiktok { top: 61.3%; }
.threads { top: 69.8%; }
.correo { top: 78.2%; }

.whatsapp-options {
  position: absolute;
  left: 17%;
  top: 34.4%;
  width: 66%;
  display: flex;
  flex-direction: column;
  gap: clamp(6px, 1.6vw, 10px);
  opacity: 0;
  pointer-events: none;
  transform: translateY(-8px);
  transition: opacity .22s ease, transform .22s ease;
  z-index: 50;
}

.whatsapp-options.open {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0);
}

.whatsapp-options a {
  background: #ffffff;
  color: #267433;
  text-decoration: none;
  text-align: center;
  font-weight: 800;
  padding: clamp(9px, 2vw, 13px) 8px;
  border-radius: clamp(13px, 3vw, 18px);
  box-shadow: 0 10px 24px rgba(0,0,0,.20);
  font-size: clamp(12px, 3.3vw, 16px);
  line-height: 1.15;
}

.whatsapp-options a:active {
  transform: scale(.98);
  background: #f5fff2;
}

@media (max-width: 430px) {
  .hotspot {
    left: 15.2%;
    width: 69.6%;
    height: 7.25%;
  }

  .wa-main { top: 27.25%; }
  .ita { top: 35.85%; }
  .catalogo { top: 44.35%; }
  .web { top: 52.85%; }
  .tiktok { top: 61.35%; }
  .threads { top: 69.85%; }
  .correo { top: 78.25%; }

  .whatsapp-options {
    left: 15%;
    width: 70%;
    top: 34.2%;
  }
}

@media (max-width: 360px) {
  .whatsapp-options a {
    font-size: 11px;
    padding: 8px 6px;
  }
}
</style>
</head>

<body>

<script>
const waBtn = document.getElementById("waBtn");
const waOptions = document.getElementById("waOptions");

waBtn.addEventListener("click", function(e) {
  e.preventDefault();
  waOptions.classList.toggle("open");
});

document.addEventListener("click", function(e) {
  if (!waBtn.contains(e.target) && !waOptions.contains(e.target)) {
    waOptions.classList.remove("open");
  }
});

document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") {
    waOptions.classList.remove("open");
  }
});
</script>
